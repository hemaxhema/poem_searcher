name: poem_searcher
description: "Arabic poem browser and tashkeel-aware search (Windows & Android)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Platform-neutral SQLite API types (Database/DatabaseFactory) used by the
  # shared code; each platform supplies its own factory implementation.
  sqflite_common: ^2.5.0

  # SQLite on desktop (FFI) + bundled native library for Windows.
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24

  # Writable app-support directory for the DB copy on Android.
  path_provider: ^2.1.4

  # Copy the bundled asset DB to a writable location on first run.
  path: ^1.9.0

  # Persist the user's selected/ordered search sources across app restarts.
  shared_preferences: ^2.3.0

  # Open a poem's source URL in the system browser.
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Generate Android launcher icons from the shared app icon.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/database/DB_Poems.db
    - assets/fonts/
    - version.txt

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/poem-searcher-2b-1024.png"
  # Adaptive icon for Android 8+. The 1024x1024 source has transparent corners
  # and a pale-blue (#B9D4E8) fill, so using that same colour as the adaptive
  # background makes the masked corners seamless.
  adaptive_icon_background: "#B9D4E8"
  adaptive_icon_foreground: "assets/icon/poem-searcher-2b-1024.png"
