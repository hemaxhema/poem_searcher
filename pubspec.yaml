name: poem_searcher
description: "Arabic poem browser and tashkeel-aware search (Windows desktop)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # SQLite on desktop (FFI) + bundled native library for Windows.
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24

  # Copy the bundled asset DB to a writable location on first run.
  path_provider: ^2.1.4
  path: ^1.9.0

  # Persist the user's selected/ordered search sources across app restarts.
  shared_preferences: ^2.3.0

  # Open a poem's source URL in the system browser.
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/database/DB_Poems.db
    - assets/fonts/
